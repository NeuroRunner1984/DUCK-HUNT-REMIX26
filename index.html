<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Duck Hunt REMIXED!</title>
        <link rel="stylesheet" href="duckhunt.css">
        <link rel="icon" type="image/png" href="duck-right.gif">
    </head>
    <body>
        <div id="gameArea">
            <!-- other game elements go here -->
              <canvas id="gameCanvas"> </canvas>
                    <div id="start-overlay" class="overlay"> 
             <h1>DUCK HUNT</h1>

             <div class="stamp-container">
  <h2>REMIXED!</h2>
</div>
 
            <p>Click the start game button to play</p>
            <button id="startGameButton">Start Game</button>
            
        </div>  
            <p id="score" >0</p>
            <div id="timer">0:30</div>
        </div>
        
        <div id="gameOverScreen" style="display: none;">
            <h3>GAME OVER</h3>
            <button id="restartButton">Play Again?</button>
        </div>

        <script type="module" src="duckhunt.js"></script>
 
    </body>
</html>
